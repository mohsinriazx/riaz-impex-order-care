services:
  - type: web
    name: riaz-impex-order-care
    runtime: node
    buildCommand: npm install && npm run setup && npm run build
    startCommand: npm run start
    envVars:
      - key: SCOPES
        value: read_orders,write_orders,read_customers,read_all_orders
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: RESEND_REPLY_TO
        sync: false
      - key: SHOPIFY_STORE_DOMAIN
        sync: false
